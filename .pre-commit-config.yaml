repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        exclude: ^alembic/
        args: [ --fix ]
      - id: ruff-format
  
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        exclude: ^alembic/
        additional_dependencies: 
          - sqlalchemy>=2.0.30
          - pydantic>=2.7.0
          - pydantic-settings>=2.3.0